<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Play Checkers Online (Vs Bot & PvP) | CoZynX</title>

    <meta name="description" content="Play classic Checkers online — choose PvP or play vs bot. Smooth, modern UI with forced jumps and king promotions. Built by CoZynX.">
    <meta name="keywords" content="checkers, classic checkers, play checkers online, checkers vs bot, checkers game, PvP checkers, board game">
    <meta name="robots" content="index,follow">

    <!-- Canonical (best effort for local usage; update if you deploy) -->
    <link rel="canonical" href="./">

    <!-- OpenGraph -->
    <meta property="og:title" content="Play Checkers Online (Vs Bot & PvP) | CoZynX">
    <meta property="og:description" content="Play classic Checkers online — choose PvP or play vs bot. Smooth, modern UI with forced jumps and king promotions. Built by CoZynX.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Play Checkers Online (Vs Bot & PvP) | CoZynX">
    <meta name="twitter:description" content="Play classic Checkers online — choose PvP or play vs bot. Smooth, modern UI with forced jumps and king promotions. Built by CoZynX.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon"              href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">

        <div id="header-row">
            <h1>Checkers <span class="brand">by CoZynX</span></h1>
                <div id="header-controls">
                    <div id="header-controls-row">
                        <!-- Mode Toggle Pill -->
                        <div id="mode-toggle" role="group" aria-label="Game mode">
                            <button id="btn-mode-ai"  class="mode-btn active" onclick="setMode('ai')">
                                <span class="mode-icon">🤖</span> vs Bot
                            </button>
                            <button id="btn-mode-pvp" class="mode-btn"        onclick="setMode('pvp')">
                                <span class="mode-icon">👥</span> PvP
                            </button>
                        </div>

                        <!-- Difficulty Selector -->
                        <div id="difficulty-selector" class="diff-toggle">
                        <button id="btn-diff-easy" class="diff-btn" onclick="setDifficulty('easy')">Easy</button>
                        <button id="btn-diff-medium" class="diff-btn active" onclick="setDifficulty('medium')">Med</button>
                        <button id="btn-diff-hard" class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="status-bar">
            <div id="player-indicator">
                <span id="turn-dot"></span>
                <span id="turn-text">Your Turn</span>
            </div>
            <div id="score">
                <span class="score-purple">
                    <span class="score-pip"></span>
                    <span id="label-purple">You</span>: <strong id="score-purple">12</strong>
                </span>
                <span class="score-red">
                    <span class="score-pip"></span>
                    <span id="label-red">Bot</span>: <strong id="score-red">12</strong>
                </span>
            </div>
        </div>

        <div id="forced-jump-warning" class="hidden">⚠️ Forced Jump Available!</div>
        <div id="game-body">
            <div id="board"></div>
            <div id="move-history">
                <div class="history-header">Move History</div>
                <div id="history-log"></div>
            </div>
        </div>

        <div id="controls">
            <button id="btn-new-game" onclick="newGame()">New Game</button>
            <button id="btn-undo"     onclick="undoMove()">Undo</button>
        </div>

        <div id="message-box"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
